# Root uv workspace configuration for Velonus monorepo.
# Covers all Python apps and packages in the monorepo.
# Using uv workspaces — do NOT use pip or poetry to manage dependencies.

[tool.uv.workspace]
members = [
    "apps/cli",
    "apps/api",
    "packages/scanner",
    "packages/normalizer",
    "packages/ai-engine",
    "packages/github",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "TCH"]
ignore = ["E501"]

[tool.mypy]
strict = true
python_version = "3.12"
ignore_missing_imports = false

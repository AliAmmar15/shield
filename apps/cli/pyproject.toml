# Shield CLI package configuration.
# Installable as `shield-cli` via PyPI (Phase 5).
# Entry point: `shield` command maps to shield.main:app

[project]
name = "shield-cli"
version = "0.1.0"
description = "AI-native application security scanner for developers."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }

dependencies = [
    "typer>=0.12.0",          # CLI framework — locked, do not swap for click directly
    "rich>=13.7.0",           # Terminal output — tables, spinners, color
    "httpx>=0.27.0",          # Async HTTP client for API calls (Phase 2+)
]

[project.scripts]
shield = "shield.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
dev-dependencies = [
    "ruff>=0.4.0",            # Replaces black + isort + flake8 — do NOT add those
    "mypy>=1.10.0",           # Strict type checking
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
]

[tool.hatch.build.targets.wheel]
packages = ["shield"]

[tool.mypy]
strict = true
python_version = "3.12"

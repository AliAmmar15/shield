[project]
name = "shield-normalizer"
version = "0.1.0"
description = "Shield AI — Finding normalization and deduplication"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

# The normalizer Python package files live at the project root
# (packages/normalizer/__init__.py, models.py, etc.) — not in a subdirectory.
# package_dir maps the `normalizer` package namespace to "." (this directory).
[tool.setuptools.package-dir]
normalizer = "."

[tool.setuptools]
packages = ["normalizer"]
